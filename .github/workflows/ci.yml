name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: install deps
        run: pip install pyyaml
      - name: danger-case regression
        run: python tests/test_triage.py
      - name: evidence provider contract (KnowS ok/timeout/empty)
        run: python tests/test_evidence_contract.py
      - name: end-to-end pipeline smoke
        run: python tests/test_pipeline.py
      - name: MCP server handshake smoke
        run: python tests/test_mcp_server.py
      - name: Space assess smoke
        run: python tests/test_space_app.py
