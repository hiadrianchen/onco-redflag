# 高频谣言循证辟谣卡（todo3 限定版）—— 人工撰写，逐条挂真实指南/文献，绝不开放生成式答疑。
#
# 红线（与全工具一致）：
# - 本文件是**科普**内容，不参与判级（判级只在 engine/triage.py）；每条都带「安全提醒」桥回就医判断。
# - `truth` / `safety` 为人工撰写，须经得起所引循证；不得含"你没事/不用去/在家观察/无需就医/可以放心"等放行宽慰语。
# - `source_key` 指向 mcp/evidence_lookup 的已收录循证 topic（evidence_lookup(source_key, mode="verdict")），
#   citations 全部来自真实指南/文献（KnowS 预检索 vendored + 本地 validated），**不在此文件编造 url/snippet**。
# - 选题原则：只收"病友群高频、且有权威依据可辟"的说法；拿不准、无依据可辟的一律不收（诚实 > 凑数）。
#
# 字段：id / title(折叠项标题,常驻可见的问题钩子) / claim(常听到的说法) / verdict(一句话结论)
#       / truth(循证讲清) / safety(桥回就医) / source_key

myths:
  - id: fawu
    title: "化疗能不能吃“发物”？（鸡蛋、鱼虾、牛羊肉）"
    claim: "化疗期间要忌“发物”——鸡蛋、鱼虾、牛羊肉、豆制品都不能吃，不然病情会“发”起来。"
    verdict: "没有依据。治疗期更要吃够优质蛋白，盲目忌口反而伤身。"
    truth: >
      “发物”不是现代医学概念，目前没有证据支持靠忌口能控制肿瘤。相反，化疗期间身体修复和免疫都需要
      足够能量和优质蛋白——鱼、蛋、瘦肉、奶、豆制品都是好来源。盲目忌口、只喝粥喝汤，最常见的结果是
      吃不够、掉体重、营养不良，而营养不良会降低化疗耐受性和疗效。除非医生针对你的情况明确交代要忌口
      （如特定过敏、某些检查或治疗前），治疗期更该好好吃、把蛋白吃够；食材新鲜、做熟、注意卫生即可。
    safety: "如果正在发热、寒战，或吃不下也喝不下、持续呕吐腹泻，别纠结忌口——先按上面的判断或直接联系治疗团队。"
    source_key: onco_nutrition

  - id: starve
    title: "“饿死癌细胞”靠谱吗？（少吃、断食）"
    claim: "少吃、断食、不吃“有营养的东西”，就能把癌细胞“饿死”。"
    verdict: "做不到，还有害。先被“饿”到的是患者自己的肌肉和体重。"
    truth: >
      靠挨饿“饿死”肿瘤没有科学依据：在饿到肿瘤之前，先被消耗的是患者自己的肌肉和体重。肿瘤患者本就
      容易营养不良甚至恶液质（明显消瘦、乏力、肌肉流失），刻意节食或断食会加速这个过程，削弱免疫、
      降低对化疗的耐受，对病情不利。正确做法是按营养评估补够能量和蛋白；如果已经在掉体重、吃不下，
      更要尽早找营养科或主诊团队做营养支持，而不是继续少吃。
    safety: "如果已明显消瘦、或连续几天几乎吃不下喝不下，请尽快联系治疗团队评估营养，别自行断食。"
    source_key: onco_nutrition

  - id: wbc_outdoor
    title: "白细胞低，是不是绝对不能出门？"
    claim: "白细胞（中性粒细胞）低的时候绝对不能出门，一出门就会感染。"
    verdict: "不是一刀切。要看降低程度和防护，重点是盯紧感染信号。"
    truth: >
      白细胞低时确实更容易感染，但“能不能出门”取决于降低的程度和防护，而非一刀切。轻中度降低时，
      做好防护通常可以适度外出：戴口罩、勤洗手、避开人多密闭场所和明显生病的人。中性粒细胞严重缺乏
      （粒缺）期间，则应按医嘱尽量减少外出与探视、避开人群和未洗净的生冷食物。无论能不能出门，关键是
      盯紧感染信号——一旦发热就是急症。具体到你的情况，以血常规结果和主诊团队的交代为准。
    safety: "粒细胞低期间，只要出现发热≥38℃、寒战或其他危险信号，无论在家还是在外都要立刻联系治疗团队/就医——这种情况下发热是急症。"
    source_key: nci_infection
